name: ImmortalWrt SDK 快编

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      sdk_url:
        description: 'SDK 下载地址（.tar.zst 或 .tar.xz）'
        required: true
        type: string
        default: 'https://downloads.immortalwrt.org/releases/24.10.2/targets/mediatek/filogic/immortalwrt-sdk-24.10.2-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst'
      source_repo:
        description: '上游源码仓库（用于拉取 MTK 包）'
        required: false
        type: string
        default: 'https://github.com/padavanonly/immortalwrt-mt798x-6.6'
      source_branch:
        description: '上游源码分支'
        required: false
        type: string
        default: 'openwrt-24.10-6.6'
      reuse_sdk_cache:
        description: '是否复用 SDK 缓存'
        required: false
        type: boolean
        default: true

env:
  SDK_URL: ${{ github.event.inputs.sdk_url }}
  SOURCE_REPO: ${{ github.event.inputs.source_repo || 'https://github.com/padavanonly/immortalwrt-mt798x-6.6' }}
  SOURCE_BRANCH: ${{ github.event.inputs.source_branch || 'openwrt-24.10-6.6' }}
  REUSE_SDK_CACHE_INPUT: ${{ github.event.inputs.reuse_sdk_cache || 'true' }}
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  sdk-build:
    name: ⚡ SDK 编译关键包
    runs-on: ubuntu-22.04

    steps:
      - name: 🙌 检出代码
        uses: actions/checkout@v4

      - name: 🛠️ 初始化环境
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install build-essential clang flex g++ gawk gcc-multilib gettext git libncurses-dev libssl-dev python3 python3-pip rsync unzip wget zlib1g-dev file xz-utils zstd
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: 🔑 生成 SDK 缓存键
        id: sdk-key
        run: |
          SDK_HASH="$(printf '%s' "$SDK_URL" | sha256sum | cut -c1-16)"
          echo "key=${{ runner.os }}-openwrt-sdk-${SDK_HASH}" >> "$GITHUB_OUTPUT"

      - name: ⚙️ 缓存 SDK 目录
        id: sdk-cache
        if: env.REUSE_SDK_CACHE_INPUT == 'true'
        uses: actions/cache@v4
        with:
          path: /workdir/sdk
          key: ${{ steps.sdk-key.outputs.key }}

      - name: ⬇️ 下载并解压 SDK
        if: env.REUSE_SDK_CACHE_INPUT != 'true' || steps.sdk-cache.outputs.cache-hit != 'true'
        working-directory: /workdir
        run: |
          wget -nv -O sdk.tar "$SDK_URL"
          mkdir -p sdk
          if file sdk.tar | grep -qi "Zstandard"; then
            tar --zstd -xf sdk.tar -C sdk --strip-components=1
          else
            tar -xf sdk.tar -C sdk --strip-components=1
          fi

      - name: ⬇️ 拉取上游 MTK 包
        working-directory: /workdir
        run: |
          rm -rf src-upstream
          start_heartbeat() {
            (
              while true; do
                echo "⏳ 正在拉取上游 MTK 包: $(date '+%F %T')"
                sleep 20
              done
            ) &
            HEARTBEAT_PID=$!
          }

          stop_heartbeat() {
            if [ -n "${HEARTBEAT_PID:-}" ]; then
              kill "$HEARTBEAT_PID" 2>/dev/null || true
              wait "$HEARTBEAT_PID" 2>/dev/null || true
              unset HEARTBEAT_PID
            fi
          }

          export GIT_TERMINAL_PROMPT=0
          start_heartbeat
          timeout 8m git clone --depth=1 --filter=blob:none --sparse --single-branch --branch "$SOURCE_BRANCH" "$SOURCE_REPO" src-upstream
          stop_heartbeat

          cd src-upstream
          git sparse-checkout set \
            package/mtk/applications/mtwifi-cfg \
            package/mtk/applications/datconf \
            package/mtk/drivers/wifi-profile

      - name: 🧩 注入本地包与修复补丁
        run: |
          mkdir -p /workdir/sdk/package/mtk/applications
          mkdir -p /workdir/sdk/package/mtk/drivers

          cp -a /workdir/src-upstream/package/mtk/applications/mtwifi-cfg /workdir/sdk/package/mtk/applications/
          cp -a /workdir/src-upstream/package/mtk/applications/datconf /workdir/sdk/package/mtk/applications/
          cp -a /workdir/src-upstream/package/mtk/drivers/wifi-profile /workdir/sdk/package/mtk/drivers/

          cp -a package/luci-app-button-automation /workdir/sdk/package/

          if [ -f /workdir/sdk/package/mtk/applications/mtwifi-cfg/files/mtwifi-cfg/mtwifi_cfg ]; then
            python3 -c "from pathlib import Path; p=Path('/workdir/sdk/package/mtk/applications/mtwifi-cfg/files/mtwifi-cfg/mtwifi_cfg'); t=p.read_text(encoding='utf-8'); t=t.replace('__exec_iwpriv_cmd(ifname, \"ApCliAutoConnect\", \"3\")','__exec_iwpriv_cmd(ifname, \"ApCliAutoConnect\", \"1\")'); t=t.replace('os.execute(\"startwapp.sh\")','os.execute(\"command -v startwapp.sh >/dev/null 2>&1 && startwapp.sh || true\")'); p.write_text(t, encoding='utf-8')"
          fi

      - name: ⚙️ 更新 feeds 并编译关键包
        run: |
          cd /workdir/sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          printf '%s\n' \
            'CONFIG_PACKAGE_mtwifi-cfg=m' \
            'CONFIG_PACKAGE_luci-app-button-automation=m' \
            >> .config
          make defconfig

          CPU_THREADS="$(nproc)"
          BUILD_JOBS="$((CPU_THREADS + 1))"
          BUILD_LOAD="$CPU_THREADS"

          make package/mtk/applications/datconf/clean
          make package/mtk/applications/datconf/compile -j"${BUILD_JOBS}" -l"${BUILD_LOAD}" V=s

          make package/mtk/drivers/wifi-profile/clean
          make package/mtk/drivers/wifi-profile/compile -j"${BUILD_JOBS}" -l"${BUILD_LOAD}" V=s

          make package/mtk/applications/mtwifi-cfg/clean
          make package/mtk/applications/mtwifi-cfg/compile -j"${BUILD_JOBS}" -l"${BUILD_LOAD}" V=s

          make package/luci-app-button-automation/clean
          make package/luci-app-button-automation/compile -j"${BUILD_JOBS}" -l"${BUILD_LOAD}" V=s

      - name: 📦 上传 ipk（若存在）
        uses: actions/upload-artifact@v4
        with:
          name: sdk-build-ipk
          path: |
            /workdir/sdk/bin/packages/**/datconf-lua*.ipk
            /workdir/sdk/bin/packages/**/wifi-dats*.ipk
            /workdir/sdk/bin/packages/**/mtwifi-cfg*.ipk
            /workdir/sdk/bin/packages/**/luci-app-button-automation*.ipk
          if-no-files-found: warn
