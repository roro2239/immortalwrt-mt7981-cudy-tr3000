name: ImmortalWrt SDK 插件编译

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/openwrt-sdk-plugin-builder.yml'
      - 'config/256m.config'
      - 'package/luci-app-ufi-tools/**'
  workflow_dispatch:
    inputs:
      sdk_version:
        description: 'SDK 版本（留空自动取官方最新稳定版）'
        required: false
        type: string
        default: ''
      sdk_url:
        description: 'SDK 下载地址（优先级最高，留空则按版本自动拼接）'
        required: false
        type: string
        default: ''
      artifact_tag:
        description: '产物标签（可选）'
        required: false
        type: string
        default: ''
      plugin_version:
        description: '统一插件版本号（留空则保持各插件 Makefile 中的 PKG_VERSION）'
        required: false
        type: string
        default: ''

concurrency:
  group: sdk-plugin-build-${{ github.ref }}
  cancel-in-progress: true

env:
  TARGET_BOARD: mediatek
  TARGET_SUBTARGET: filogic
  SDK_VERSION_INPUT: ${{ github.event.inputs.sdk_version || '' }}
  SDK_URL_INPUT: ${{ github.event.inputs.sdk_url || '' }}
  ARTIFACT_TAG_INPUT: ${{ github.event.inputs.artifact_tag || '' }}
  PLUGIN_VERSION_INPUT: ${{ github.event.inputs.plugin_version || '' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  TZ: Asia/Shanghai

jobs:
  sdk-build:
    name: SDK 编译自定义插件
    runs-on: ubuntu-22.04

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 初始化环境
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm mkisofs ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig tar texinfo uglifyjs unzip wget xz-utils xmlto zlib1g-dev zstd
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: 检查最新稳定版 SDK
        id: latest_sdk
        shell: bash
        run: |
          set -euo pipefail

          latest_stable_version="$(
            curl -fsSL https://downloads.immortalwrt.org/ \
            | grep -oE 'ImmortalWrt [0-9]+\.[0-9]+\.[0-9]+' \
            | head -n1 \
            | awk '{print $2}'
          )"

          if [ -z "${latest_stable_version}" ]; then
            echo "无法识别官方最新稳定版 SDK 版本"
            exit 1
          fi

          echo "latest_stable_version=${latest_stable_version}" >> "$GITHUB_OUTPUT"
          echo "LATEST_STABLE_SDK_VERSION=${latest_stable_version}" >> "$GITHUB_ENV"
          echo "官方最新稳定版 SDK: ${latest_stable_version}"

      - name: 解析 SDK 下载地址
        id: sdk_info
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${SDK_URL_INPUT}" ]; then
            sdk_url="${SDK_URL_INPUT}"
            sdk_file="$(basename "${sdk_url}")"
            sdk_version="$(printf '%s\n' "${sdk_file}" | sed -n 's/^immortalwrt-sdk-\([0-9][^ -]*\)-'"${TARGET_BOARD}"'-'"${TARGET_SUBTARGET}"'.*$/\1/p')"
            if [ -z "${sdk_version}" ]; then
              sdk_version="custom"
            fi
          else
            sdk_version="${SDK_VERSION_INPUT}"
            if [ -z "${sdk_version}" ]; then
              sdk_version="${LATEST_STABLE_SDK_VERSION}"
            fi

            if [ -z "${sdk_version}" ]; then
              echo "无法识别最新稳定版 SDK 版本"
              exit 1
            fi

            target_url="https://downloads.immortalwrt.org/releases/${sdk_version}/targets/${TARGET_BOARD}/${TARGET_SUBTARGET}/"
            sdk_file="$(
              curl -fsSL "${target_url}" \
              | grep -oE "immortalwrt-sdk-${sdk_version}-${TARGET_BOARD}-${TARGET_SUBTARGET}[^\"']*Linux-x86_64\\.tar\\.(xz|zst)" \
              | head -n1
            )"

            if [ -z "${sdk_file}" ]; then
              echo "目标目录未找到 SDK 文件: ${target_url}"
              exit 1
            fi

            sdk_url="${target_url}${sdk_file}"
          fi

          echo "SDK_VERSION=${sdk_version}" >> "$GITHUB_ENV"
          echo "SDK_FILE=${sdk_file}" >> "$GITHUB_ENV"
          echo "SDK_URL=${sdk_url}" >> "$GITHUB_ENV"
          echo "sdk_version=${sdk_version}" >> "$GITHUB_OUTPUT"
          echo "sdk_file=${sdk_file}" >> "$GITHUB_OUTPUT"
          echo "sdk_url=${sdk_url}" >> "$GITHUB_OUTPUT"

          echo "SDK_VERSION=${sdk_version}"
          echo "SDK_FILE=${sdk_file}"
          echo "SDK_URL=${sdk_url}"

      - name: 检查 SDK 是否有更新
        shell: bash
        run: |
          set -euo pipefail

          latest="${LATEST_STABLE_SDK_VERSION}"
          current="${SDK_VERSION}"

          {
            echo "## SDK 状态"
            echo
            echo "- 官方最新稳定版：\`${latest}\`"
            echo "- 当前编译目标：\`${current}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -n "${SDK_URL_INPUT}" ]; then
            echo "- 当前使用自定义 SDK 地址，跳过更新性判断" >> "$GITHUB_STEP_SUMMARY"
            echo "当前使用自定义 SDK 地址，跳过更新性判断"
          elif [ "${current}" != "${latest}" ]; then
            echo "- 检查结果：检测到 SDK 已更新，当前指定版本不是最新稳定版" >> "$GITHUB_STEP_SUMMARY"
            echo "检测到 SDK 已更新：当前 ${current}，最新稳定版 ${latest}"
          else
            echo "- 检查结果：当前已是最新稳定版 SDK" >> "$GITHUB_STEP_SUMMARY"
            echo "当前已是最新稳定版 SDK：${current}"
          fi

      - name: 检查插件版本输入
        shell: bash
        run: |
          set -euo pipefail

          plugin_version="${PLUGIN_VERSION_INPUT}"

          {
            echo
            echo "## 自定义插件版本"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -z "${plugin_version}" ]; then
            echo "- 版本策略：未覆盖，保持各插件仓库内版本" >> "$GITHUB_STEP_SUMMARY"
            echo "未指定统一插件版本号，保持各插件仓库内版本"
            exit 0
          fi

          if ! printf '%s\n' "${plugin_version}" | grep -Eq '^[A-Za-z0-9][A-Za-z0-9._+-]*$'; then
            echo "插件版本号格式非法：${plugin_version}"
            echo "仅允许字母、数字、点、下划线、加号、减号，且不能以分隔符开头"
            exit 1
          fi

          echo "- 版本策略：统一覆盖所有自定义插件的 \`PKG_VERSION=${plugin_version}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "统一插件版本号：${plugin_version}"

      - name: 缓存 SDK 压缩包
        uses: actions/cache@v4
        with:
          path: /workdir/sdk-archive-cache
          key: ${{ runner.os }}-immortalwrt-sdk-archive-${{ steps.sdk_info.outputs.sdk_file }}
          restore-keys: |
            ${{ runner.os }}-immortalwrt-sdk-archive-

      - name: 缓存 SDK 包下载目录
        uses: actions/cache@v4
        with:
          path: /workdir/sdk-dl
          key: ${{ runner.os }}-immortalwrt-sdk-dl-${{ steps.sdk_info.outputs.sdk_version }}-${{ env.TARGET_BOARD }}-${{ env.TARGET_SUBTARGET }}
          restore-keys: |
            ${{ runner.os }}-immortalwrt-sdk-dl-${{ env.TARGET_BOARD }}-${{ env.TARGET_SUBTARGET }}-

      - name: 下载并解压 SDK
        shell: bash
        run: |
          set -euo pipefail
          cd /workdir

          rm -rf sdk-root
          mkdir -p sdk-root sdk-dl sdk-archive-cache

          archive="/workdir/sdk-archive-cache/${SDK_FILE}"
          if [ ! -f "${archive}" ]; then
            wget -O "${archive}" "${SDK_URL}"
          fi

          case "${SDK_FILE}" in
            *.tar.zst)
              tar --zstd -xf "${archive}" -C sdk-root
              ;;
            *.tar.xz)
              tar -xJf "${archive}" -C sdk-root
              ;;
            *)
              echo "不支持的 SDK 压缩格式: ${SDK_FILE}"
              exit 1
              ;;
          esac

          sdk_dir="$(find /workdir/sdk-root -mindepth 1 -maxdepth 1 -type d -name 'immortalwrt-sdk-*' | head -n1)"
          if [ -z "${sdk_dir}" ]; then
            echo "SDK 解压后未找到目录"
            exit 1
          fi

          rm -rf "${sdk_dir}/dl"
          ln -s /workdir/sdk-dl "${sdk_dir}/dl"

          ln -sfn "${sdk_dir}" /workdir/openwrt-sdk
          ln -sfn /workdir/openwrt-sdk "$GITHUB_WORKSPACE/openwrt-sdk"

          echo "SDK_DIR=${sdk_dir}" >> "$GITHUB_ENV"

      - name: 更新 feeds 索引
        shell: bash
        run: |
          set -euo pipefail
          cd "${SDK_DIR}"
          ./scripts/feeds update packages luci

      - name: 注入并配置自定义插件
        shell: bash
        run: |
          set -euo pipefail
          cd "${SDK_DIR}"

          tr -d '\r' < "$GITHUB_WORKSPACE/config/256m.config" > .config
          echo "已载入基础配置: config/256m.config"

          CUSTOM_PKG_DIRS=()
          CUSTOM_PKGS=()
          CUSTOM_FEED_PKGS=()

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            CUSTOM_PKG_DIRS+=("$GITHUB_WORKSPACE/package/luci-app-ufi-tools")
            echo "当前为 push 自动构建，仅编译 luci-app-ufi-tools"
          else
            while IFS= read -r pkg_dir; do
              CUSTOM_PKG_DIRS+=("${pkg_dir}")
            done < <(find "$GITHUB_WORKSPACE/package" -mindepth 1 -maxdepth 1 -type d | sort)
            echo "当前为手动触发，编译 package 目录下全部自定义插件"
          fi

          for pkg_dir in "${CUSTOM_PKG_DIRS[@]}"; do
            if [ ! -d "${pkg_dir}" ]; then
              echo "未找到目标插件目录：${pkg_dir}"
              exit 1
            fi

            pkg_name="$(basename "${pkg_dir}")"
            CUSTOM_PKGS+=("${pkg_name}")
            rm -rf "package/${pkg_name}"
            cp -a "${pkg_dir}" "package/${pkg_name}"

            if [ -n "${PLUGIN_VERSION_INPUT}" ]; then
              makefile_path="package/${pkg_name}/Makefile"
              if [ ! -f "${makefile_path}" ]; then
                echo "未找到插件 Makefile: ${makefile_path}"
                exit 1
              fi

              if ! grep -Eq '^PKG_VERSION:=' "${makefile_path}"; then
                echo "插件 Makefile 缺少 PKG_VERSION 定义: ${makefile_path}"
                exit 1
              fi

              sed -i -E "s|^PKG_VERSION:=.*$|PKG_VERSION:=${PLUGIN_VERSION_INPUT}|" "${makefile_path}"
              echo "已统一版本号: ${pkg_name} -> ${PLUGIN_VERSION_INPUT}"
            fi

            if [ -f "package/${pkg_name}/Makefile" ]; then
              while IFS= read -r dep_line; do
                dep_body="${dep_line#*=}"
                for raw_dep in ${dep_body}; do
                  dep="${raw_dep#\+}"
                  case "${dep}" in
                    ""|@*)
                      continue
                      ;;
                  esac

                  dep="${dep##*:}"
                  dep="${dep%%/*}"
                  dep="${dep%%+*}"

                  case "${dep}" in
                    ""|@*)
                      continue
                      ;;
                  esac

                  CUSTOM_FEED_PKGS+=("${dep}")
                done
              done < <(grep -E '^(LUCI_DEPENDS|DEPENDS|PKG_BUILD_DEPENDS|HOST_BUILD_DEPENDS):=' "package/${pkg_name}/Makefile" || true)
            fi
          done

          if [ "${#CUSTOM_PKGS[@]}" -eq 0 ]; then
            echo "未发现自定义插件目录：$GITHUB_WORKSPACE/package"
            exit 1
          fi

          : > /workdir/custom-pkgs.txt
          for pkg in "${CUSTOM_PKGS[@]}"; do
            echo "${pkg}" >> /workdir/custom-pkgs.txt
            echo "CONFIG_PACKAGE_${pkg}=m" >> .config
          done
          sort -u /workdir/custom-pkgs.txt -o /workdir/custom-pkgs.txt

          : > /workdir/custom-feed-pkgs.txt
          {
            printf '%s\n' \
              cgi-io \
              lua \
              lua-cjson \
              luci-base \
              luci-compat \
              luci-lib-base \
              luci-lib-ipkg \
              lucihttp \
              rpcd-mod-luci \
              ucode \
              ucode-mod-html \
              ucode-mod-lua
            if [ "${#CUSTOM_FEED_PKGS[@]}" -gt 0 ]; then
              printf '%s\n' "${CUSTOM_FEED_PKGS[@]}"
            fi
          } | sed '/^$/d' | sort -u > /workdir/custom-feed-pkgs.txt

          if [ "${#CUSTOM_FEED_PKGS[@]}" -gt 0 ]; then
            echo "检测到的直接 feed 依赖："
            printf '%s\n' "${CUSTOM_FEED_PKGS[@]}" | sed '/^$/d' | sort -u
          else
            echo "未检测到插件直接 feed 依赖"
          fi

          echo "本次 SDK 编译插件："
          cat /workdir/custom-pkgs.txt

          echo "本次 SDK 安装的 feed 依赖："
          cat /workdir/custom-feed-pkgs.txt

          if [ -n "${PLUGIN_VERSION_INPUT}" ]; then
            echo "统一插件版本号：${PLUGIN_VERSION_INPUT}"
          fi

      - name: 安装自定义插件所需 feeds 依赖
        shell: bash
        run: |
          set -euo pipefail
          cd "${SDK_DIR}"

          echo "开始按需安装以下 feed 依赖："
          cat /workdir/custom-feed-pkgs.txt

          while IFS= read -r feed_pkg; do
            [ -n "${feed_pkg}" ] || continue
            ./scripts/feeds install "${feed_pkg}"
          done < /workdir/custom-feed-pkgs.txt

          make defconfig

      - name: 编译自定义插件
        shell: bash
        run: |
          set -euo pipefail
          cd "${SDK_DIR}"

          CPU_THREADS="$(nproc)"
          BUILD_JOBS="$((CPU_THREADS * 2))"
          BUILD_LOAD="$((CPU_THREADS * 2))"
          [ "${BUILD_JOBS}" -lt 4 ] && BUILD_JOBS=4
          [ "${BUILD_LOAD}" -lt 4 ] && BUILD_LOAD=4

          rm -rf /workdir/sdk-logs
          mkdir -p /workdir/sdk-logs

          while IFS= read -r pkg; do
            [ -n "${pkg}" ] || continue
            echo "开始编译插件: ${pkg}"
            if make "package/${pkg}/compile" -j"${BUILD_JOBS}" -l"${BUILD_LOAD}"; then
              continue
            fi

            log_file="/workdir/sdk-logs/${pkg}.log"
            echo "并行编译失败，开始输出详细日志: ${pkg}"
            if ! make "package/${pkg}/compile" -j1 V=s 2>&1 | tee "${log_file}"; then
              echo "详细日志已保存: ${log_file}"
              exit 1
            fi
          done < /workdir/custom-pkgs.txt

      - name: 上传编译日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sdk-plugin-logs-${{ env.ARTIFACT_TAG_INPUT || steps.sdk_info.outputs.sdk_version }}
          path: /workdir/sdk-logs/*
          if-no-files-found: ignore

      - name: 收集 ipk
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /workdir/sdk-ipk
          mkdir -p /workdir/sdk-ipk

          while IFS= read -r pkg; do
            [ -n "${pkg}" ] || continue
            find "${SDK_DIR}/bin/packages" -type f -name "${pkg}_*.ipk" -exec cp -f {} /workdir/sdk-ipk/ \;
          done < /workdir/custom-pkgs.txt

          if [ -z "$(ls -A /workdir/sdk-ipk 2>/dev/null)" ]; then
            echo "未收集到任何自定义插件 ipk"
            exit 1
          fi

          cp /workdir/custom-pkgs.txt /workdir/sdk-ipk/custom-packages.txt

      - name: 上传 ipk
        uses: actions/upload-artifact@v4
        with:
          name: sdk-plugin-ipk-${{ env.ARTIFACT_TAG_INPUT || steps.sdk_info.outputs.sdk_version }}
          path: |
            /workdir/sdk-ipk/*.ipk
            /workdir/sdk-ipk/custom-packages.txt
          if-no-files-found: error
