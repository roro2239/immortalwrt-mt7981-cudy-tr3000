name: ImmortalWrt зј–иҜ‘

permissions:
  contents: write

on:
  repository_dispatch:
    types: [ "Source Code Update" ]
  workflow_dispatch:
    inputs:
      device:
        description: 'зј–иҜ‘и®ҫеӨҮеһӢеҸ·'
        required: true
        type: choice
        default: '256M'
        options:
          - '256M'
      repo:
        description: 'жҢҮе®ҡжәҗз Ғд»“еә“ең°еқҖ'
        required: true
        type: string
        default: 'https://github.com/padavanonly/immortalwrt-mt798x-6.6'
      commit:
        description: 'жҢҮе®ҡжәҗз ҒcommitиҝӣиЎҢзј–иҜ‘пјҢз•ҷз©әжӢүеҸ–жңҖж–°жәҗз Ғ'
        required: false
        type: string
        default: ''
      firmware_name:
        description: 'еӣәд»¶еҗҚз§°пјҲдёәз©әй»ҳи®Ө ImmortalWrtпјү'
        required: false
        type: string
        default: ''
      lan_ip:
        description: 'еҗҺеҸ°ең°еқҖпјҲй»ҳи®Ө 22.2.2.2пјү'
        required: false
        type: string
        default: '22.2.2.2'
      disable_system_update:
        description: 'жҳҜеҗҰзҰҒз”Ёзі»з»ҹеңЁзәҝжӣҙж–°'
        required: false
        type: boolean
        default: true
      enable_proxy:
        description: 'жҳҜеҗҰеҗҜз”Ёд»ЈзҗҶпјҲOpenClashпјү'
        required: false
        type: boolean
        default: true
      enable_ttyd:
        description: 'жҳҜеҗҰеҗҜз”Ёз»Ҳз«ҜпјҲttydпјү'
        required: false
        type: boolean
        default: true
      enable_upnp:
        description: 'жҳҜеҗҰеҗҜз”Ё UPnP'
        required: false
        type: boolean
        default: true
      enable_package_manager:
        description: 'жҳҜеҗҰеҗҜз”ЁиҪҜд»¶еҢ…з®ЎзҗҶ'
        required: false
        type: boolean
        default: false
      enable_wrtbwmon:
        description: 'жҳҜеҗҰеҗҜз”ЁжөҒйҮҸзӣ‘жҺ§пјҲwrtbwmonпјү'
        required: false
        type: boolean
        default: false
      enable_istore:
        description: 'жҳҜеҗҰеҗҜз”Ё iStore'
        required: false
        type: boolean
        default: true
      extra_packages:
        description: 'йўқеӨ–е®үиЈ…еҢ…пјҲз©әж ј/йҖ—еҸ·/жҚўиЎҢеҲҶйҡ”пјү'
        required: false
        type: string
        default: ''
      remove_packages:
        description: 'з§»йҷӨеҢ…пјҲз©әж ј/йҖ—еҸ·/жҚўиЎҢеҲҶйҡ”пјү'
        required: false
        type: string
        default: ''
      release:
        description: 'жҳҜеҗҰеҸ‘еёғзј–иҜ‘дә§зү©еҲ°еҸ‘иЎҢзүҲ'
        required: false
        type: boolean
        default: true
      prerelease:
        description: 'жҳҜеҗҰеҸ‘еёғдёәйў„еҸ‘еёғзүҲжң¬'
        required: false
        type: boolean
        default: false

env:
  DEVICE_INPUT: ${{ github.event.inputs.device || github.event.client_payload.device }}
  FIRMWARE_NAME_INPUT: ${{ github.event.inputs.firmware_name || '' }}
  LAN_IP_INPUT: ${{ github.event.inputs.lan_ip || github.event.client_payload.lan_ip || '22.2.2.2' }}
  DISABLE_SYSTEM_UPDATE_INPUT: ${{ github.event.inputs.disable_system_update || 'true' }}
  ENABLE_PROXY_INPUT: ${{ github.event.inputs.enable_proxy || 'true' }}
  ENABLE_TTYD_INPUT: ${{ github.event.inputs.enable_ttyd || 'true' }}
  ENABLE_UPNP_INPUT: ${{ github.event.inputs.enable_upnp || 'true' }}
  ENABLE_PACKAGE_MANAGER_INPUT: ${{ github.event.inputs.enable_package_manager || 'false' }}
  ENABLE_WRTBWMON_INPUT: ${{ github.event.inputs.enable_wrtbwmon || 'false' }}
  ISTORE_ENABLE_INPUT: ${{ github.event.inputs.enable_istore || 'true' }}
  EXTRA_PACKAGES_INPUT: ${{ github.event.inputs.extra_packages || '' }}
  REMOVE_PACKAGES_INPUT: ${{ github.event.inputs.remove_packages || '' }}
  CCACHE_DIR: /workdir/.ccache
  CCACHE_MAXSIZE: 2G
  REPO_URL: ${{ github.event.inputs.repo || github.event.client_payload.repo }}
  REPO_BRANCH: openwrt-24.10-6.6
  REPO_COMMIT: ${{ github.event.inputs.commit || github.event.client_payload.commit }}
  FEEDS_CONF: feeds.conf.default
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_RELEASE: ${{ github.event.inputs.release }}
  PRERELEASE: ${{ github.event.inputs.prerelease }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  TZ: Asia/Shanghai

jobs:
  build:
    name: рҹ”Ё жһ„е»әеӣәд»¶
    runs-on: ubuntu-22.04
    
    steps:
      - name: рҹҷҢ жЈҖеҮәд»Јз Ғ
        uses: actions/checkout@v4

      - name: рҹӘ  йҮҠж”ҫзЈҒзӣҳз©әй—ҙ
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: рҹӣ пёҸ еҲқе§ӢеҢ–зҺҜеўғ
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: рҹӘң е…ӢйҡҶжәҗз Ғ
        working-directory: /workdir
        run: |
          git clone $REPO_URL -b $REPO_BRANCH --single-branch --filter=blob:none openwrt
          if [ -n "${REPO_COMMIT}" ]; then
            cd openwrt && git checkout ${REPO_COMMIT}
          fi
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: вҡҷпёҸ й…ҚзҪ® ccache дёҺдёӢиҪҪзј“еӯҳ
        uses: actions/cache@v4
        with:
          path: |
            /workdir/.ccache
            /workdir/openwrt/dl
          key: ${{ runner.os }}-openwrt-combined-${{ env.REPO_BRANCH }}-${{ hashFiles('config/*.config') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-combined-${{ env.REPO_BRANCH }}-

      - name: рҹ”§ и®ҫзҪ® ccache
        run: |
          ccache --set-config=max_size=$CCACHE_MAXSIZE
          ccache --set-config=cache_dir=$CCACHE_DIR
          ccache --set-config=compression=true
          ccache -z

      - name: рҹ§¬ жӣҙж–°е№¶е®үиЈ… feeds
        run: |
          cd openwrt
          [ -e $GITHUB_WORKSPACE/$FEEDS_CONF ] && mv $GITHUB_WORKSPACE/$FEEDS_CONF feeds.conf.default
          chmod +x $GITHUB_WORKSPACE/$DIY_P1_SH
          export ISTORE_ENABLE="$ISTORE_ENABLE_INPUT"
          $GITHUB_WORKSPACE/$DIY_P1_SH
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          chmod +x $GITHUB_WORKSPACE/$DIY_P2_SH
          export DISABLE_SYSTEM_UPDATE="$DISABLE_SYSTEM_UPDATE_INPUT"
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: рҹ”Ё жһ„е»ә 256M еӣәд»¶
        id: compile
        run: |
          FW_NAME="${FIRMWARE_NAME_INPUT}"
          [ -z "$FW_NAME" ] && FW_NAME="ImmortalWrt"
          FW_TAG_PREFIX=$(echo "$FW_NAME" | tr '[:space:]' '-' | tr -cd '[:alnum:]._-')
          [ -z "$FW_TAG_PREFIX" ] && FW_TAG_PREFIX="ImmortalWrt"
          LAN_IP="$LAN_IP_INPUT"

          validate_ipv4() {
            local ip="$1"
            local IFS='.'
            local -a octets=()

            read -r -a octets <<< "$ip"
            [ "${#octets[@]}" -eq 4 ] || return 1

            for octet in "${octets[@]}"; do
              [[ "$octet" =~ ^[0-9]+$ ]] || return 1
              [ "$octet" -ge 0 ] && [ "$octet" -le 255 ] || return 1
            done
          }

          if ! validate_ipv4 "$LAN_IP"; then
            echo "вқҢ йқһжі•еҗҺеҸ°ең°еқҖ: $LAN_IP"
            exit 1
          fi

          echo "еӣәд»¶еҗҚз§°: $FW_NAME"
          echo "еӣәд»¶ж ҮзӯҫеүҚзјҖ: $FW_TAG_PREFIX"
          echo "еҗҺеҸ°ең°еқҖ: $LAN_IP"
          echo "зҰҒз”Ёзі»з»ҹеңЁзәҝжӣҙж–°: $DISABLE_SYSTEM_UPDATE_INPUT"
          echo "еҗҜз”Ёд»ЈзҗҶ(OpenClash): $ENABLE_PROXY_INPUT"
          echo "еҗҜз”Ёз»Ҳз«Ҝ(ttyd): $ENABLE_TTYD_INPUT"
          echo "еҗҜз”ЁUPnP: $ENABLE_UPNP_INPUT"
          echo "еҗҜз”ЁиҪҜд»¶еҢ…з®ЎзҗҶ: $ENABLE_PACKAGE_MANAGER_INPUT"
          echo "еҗҜз”ЁжөҒйҮҸзӣ‘жҺ§(wrtbwmon): $ENABLE_WRTBWMON_INPUT"
          echo "еҗҜз”Ё iStore: $ISTORE_ENABLE_INPUT"
          echo "fw_name=$FW_NAME" >> $GITHUB_OUTPUT
          echo "fw_tag_prefix=$FW_TAG_PREFIX" >> $GITHUB_OUTPUT

          normalize_packages() {
            printf '%s\n' "$1" | tr ',;' '\n\n' | tr ' ' '\n' | tr -d '\r' | sed '/^$/d'
          }

          validate_package_name() {
            if [[ ! "$1" =~ ^[A-Za-z0-9._+-]+$ ]]; then
              echo "вқҢ йқһжі•еҢ…еҗҚ: $1"
              exit 1
            fi
          }

          TOGGLE_ADD=""
          TOGGLE_REMOVE=""
          toggle_packages() {
            local enabled="$1"
            shift
            if [ "$enabled" = "true" ]; then
              TOGGLE_ADD="$TOGGLE_ADD $*"
            else
              TOGGLE_REMOVE="$TOGGLE_REMOVE $*"
            fi
          }

          toggle_packages "$ENABLE_PROXY_INPUT" "luci-app-openclash"
          toggle_packages "$ENABLE_TTYD_INPUT" "luci-app-ttyd luci-i18n-ttyd-zh-cn"
          toggle_packages "$ENABLE_UPNP_INPUT" "luci-app-upnp luci-i18n-upnp-zh-cn"
          toggle_packages "$ENABLE_PACKAGE_MANAGER_INPUT" "luci-app-package-manager luci-i18n-package-manager-zh-cn"
          toggle_packages "$ENABLE_WRTBWMON_INPUT" "luci-app-wrtbwmon luci-i18n-wrtbwmon-zh-cn"
          toggle_packages "$ISTORE_ENABLE_INPUT" "luci-app-store luci-lib-taskd luci-lib-xterm taskd"
          if [ "$ISTORE_ENABLE_INPUT" != "true" ]; then
            TOGGLE_REMOVE="$TOGGLE_REMOVE app-store-ui"
          fi

          DEVICES="256M"
          mkdir -p $GITHUB_WORKSPACE/firmware_collection

          cd /workdir/openwrt

          for DEV in $DEVICES; do
            echo "::group::рҹҡҖ ејҖе§Ӣжһ„е»ә $DEV"
            
            CONFIG="config/256m.config"
            
            echo "дҪҝз”Ёй…ҚзҪ®: $CONFIG"
            
            # 3. еҠ иҪҪй…ҚзҪ®
            cp -f $GITHUB_WORKSPACE/$CONFIG .config
            echo "CONFIG_VERSION_DIST=\"$FW_NAME\"" >> .config
            if grep -q '^CONFIG_TARGET_PREINIT_IP=' .config; then
              sed -i -E "s@^CONFIG_TARGET_PREINIT_IP=.*@CONFIG_TARGET_PREINIT_IP=\"${LAN_IP}\"@" .config
            else
              echo "CONFIG_TARGET_PREINIT_IP=\"${LAN_IP}\"" >> .config
            fi

            mkdir -p files/etc/uci-defaults
            printf '%s\n' \
              '#!/bin/sh' \
              '# йҰ–ж¬ЎеҗҜеҠЁж—¶еә”з”ЁиҮӘе®ҡд№ү LAN ең°еқҖпјҢйҒҝе…Қдҫқиө–дёҠжёё config_generate з»ҶиҠӮгҖӮ' \
              "uci -q set network.lan.ipaddr='${LAN_IP}'" \
              'uci -q commit network' \
              'rm -f /etc/uci-defaults/99-custom-lan-ip' \
              > files/etc/uci-defaults/99-custom-lan-ip
            chmod +x files/etc/uci-defaults/99-custom-lan-ip

            ENABLE_PKGS="$TOGGLE_ADD $(normalize_packages "$EXTRA_PACKAGES_INPUT")"
            DISABLE_PKGS="$TOGGLE_REMOVE $(normalize_packages "$REMOVE_PACKAGES_INPUT")"

            for PKG in $ENABLE_PKGS; do
              validate_package_name "$PKG"
              echo "CONFIG_PACKAGE_${PKG}=y" >> .config
            done

            for PKG in $DISABLE_PKGS; do
              validate_package_name "$PKG"
              echo "# CONFIG_PACKAGE_${PKG} is not set" >> .config
            done
            
            # 4. еҲ·ж–°й…ҚзҪ®е№¶дёӢиҪҪ
            make defconfig

            for PKG in $TOGGLE_ADD $(normalize_packages "$EXTRA_PACKAGES_INPUT"); do
              validate_package_name "$PKG"
              if ! grep -Eq "^CONFIG_PACKAGE_${PKG}=(y|m)$" .config; then
                echo "вқҢ еҢ…дёҚеҸҜз”ЁжҲ–жңӘиў«еҗҜз”Ё: $PKG"
                exit 1
              fi
            done

            make download -j$(nproc)
            
            # 5. ејҖе§Ӣзј–иҜ‘
            # дҪҝз”Ё ccache еҠ йҖҹпјҢе№¶дҝқз•ҷ Toolchain
            if ! make -j$(nproc) CC="ccache gcc" CXX="ccache g++"; then
              echo "вҡ пёҸ еӨҡзәҝзЁӢжһ„е»әеӨұиҙҘпјҢеӣһйҖҖеҲ°еҚ•зәҝзЁӢйҮҚиҜ•..."
              make -j1 V=s || exit 1
            fi

            echo "вң… $DEV жһ„е»әе®ҢжҲҗгҖӮ"
            df -hT /workdir
            echo "::endgroup::"
          done

          echo "рҹ“Ҙ жӯЈеңЁж”¶йӣҶдә§зү©"
          find bin/targets/ -name "*sysupgrade.bin" -exec cp {} $GITHUB_WORKSPACE/firmware_collection/ \;

          echo "status=success" >> $GITHUB_OUTPUT

      - name: рҹӘ„ дёҠдј дәҢиҝӣеҲ¶дә§зү©
        uses: actions/upload-artifact@v4
        if: steps.compile.outputs.status == 'success'
        with:
          name: ${{ steps.compile.outputs.fw_tag_prefix }}_Combined_${{ env.DEVICE_INPUT }}_${{ env.REPO_BRANCH }}
          path: ${{ github.workspace }}/firmware_collection/*

      - name: рҹ“Ң з”ҹжҲҗеҸ‘еёғж Үзӯҫ
        id: tag
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
        env:
          FW_NAME: ${{ steps.compile.outputs.fw_name }}
          FW_TAG_PREFIX: ${{ steps.compile.outputs.fw_tag_prefix }}
        run: |
          BUILD_TIME=$(date +"%Y%m%d-%H%M")
          RELEASE_TAG="${FW_TAG_PREFIX}-${BUILD_TIME}"
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

          cat > release.txt << EOF
          ## рҹ“Ұ ${FW_NAME} еӣәд»¶еҸ‘еёғ

          **рҹҸ·пёҸ зүҲжң¬ж Үзӯҫ:** $RELEASE_TAG
          **рҹҢҝ еҲҶж”Ҝ:** $REPO_BRANCH
          **рҹ“ұ и®ҫеӨҮ:** ${DEVICE_INPUT}
          **рҹ“… жһ„е»әж—¶й—ҙ:** $(date +"%Y-%m-%d %H:%M:%S")
          **рҹ”Ё зј–иҜ‘еҷЁ:** GCC + ccache

          ## рҹ“Ҙ дёӢиҪҪ

          иҜ·д»ҺдёӢж–№йҷ„д»¶дёӢиҪҪеӣәд»¶ж–Үд»¶гҖӮ

          ---

          еҹәдәҺ [GitHub Actions](https://github.com/features/actions) жһ„е»ә
          EOF

          echo "status=success" >> $GITHUB_OUTPUT

      - name: рҹ“Ө дёҠдј еҲ°еҸ‘иЎҢзүҲ
        uses: softprops/action-gh-release@v2
        if: steps.tag.outputs.status == 'success'
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          prerelease: ${{ env.PRERELEASE == 'true' }}
          files: ${{ github.workspace }}/firmware_collection/*

      - name: рҹҡ§ еҲ йҷӨж—§е·ҘдҪңжөҒиҝҗиЎҢи®°еҪ•
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 9
