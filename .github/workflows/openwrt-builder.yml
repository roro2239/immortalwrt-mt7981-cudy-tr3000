name: ImmortalWrt 编译

permissions:
  contents: write

on:
  repository_dispatch:
    types: [ "Source Code Update" ]
  workflow_dispatch:
    inputs:
      device:
        description: '编译设备型号'
        required: true
        type: choice
        default: '256M'
        options:
          - '256M'
      repo:
        description: '指定源码仓库地址'
        required: true
        type: string
        default: 'https://github.com/padavanonly/immortalwrt-mt798x-6.6'
      commit:
        description: '指定源码commit进行编译，留空拉取最新源码'
        required: false
        type: string
        default: ''
      firmware_name:
        description: '固件名称（为空默认 ImmortalWrt）'
        required: false
        type: string
        default: ''
      package_preset:
        description: '预设包方案（中文）'
        required: false
        type: choice
        default: '全量'
        options:
          - '全量'
          - '精简'
          - '管理'
          - '代理'
      enable_istore:
        description: '是否启用 iStore'
        required: false
        type: boolean
        default: true
      extra_packages:
        description: '额外安装包（空格/逗号/换行分隔）'
        required: false
        type: string
        default: ''
      remove_packages:
        description: '移除包（空格/逗号/换行分隔）'
        required: false
        type: string
        default: ''
      release:
        description: '是否发布编译产物到发行版'
        required: false
        type: boolean
        default: true
      prerelease:
        description: '是否发布为预发布版本'
        required: false
        type: boolean
        default: false

env:
  DEVICE_INPUT: ${{ github.event.inputs.device || github.event.client_payload.device }}
  FIRMWARE_NAME_INPUT: ${{ github.event.inputs.firmware_name || '' }}
  PACKAGE_PRESET_INPUT: ${{ github.event.inputs.package_preset || '全量' }}
  ISTORE_ENABLE_INPUT: ${{ github.event.inputs.enable_istore || 'true' }}
  EXTRA_PACKAGES_INPUT: ${{ github.event.inputs.extra_packages || '' }}
  REMOVE_PACKAGES_INPUT: ${{ github.event.inputs.remove_packages || '' }}
  CCACHE_DIR: /workdir/.ccache
  CCACHE_MAXSIZE: 2G
  REPO_URL: ${{ github.event.inputs.repo || github.event.client_payload.repo }}
  REPO_BRANCH: openwrt-24.10-6.6
  REPO_COMMIT: ${{ github.event.inputs.commit || github.event.client_payload.commit }}
  FEEDS_CONF: feeds.conf.default
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_RELEASE: ${{ github.event.inputs.release }}
  PRERELEASE: ${{ github.event.inputs.prerelease }}
  TZ: Asia/Shanghai

jobs:
  build:
    name: 🔨 构建固件
    runs-on: ubuntu-22.04
    
    steps:
      - name: 🙌 检出代码
        uses: actions/checkout@v4

      - name: 🪠 释放磁盘空间
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: 🛠️ 初始化环境
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: 🪜 克隆源码
        working-directory: /workdir
        run: |
          git clone $REPO_URL -b $REPO_BRANCH --single-branch --filter=blob:none openwrt
          if [ -n "${REPO_COMMIT}" ]; then
            cd openwrt && git checkout ${REPO_COMMIT}
          fi
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: ⚙️ 配置 ccache 与下载缓存
        uses: actions/cache@v4
        with:
          path: |
            /workdir/.ccache
            /workdir/openwrt/dl
          key: ${{ runner.os }}-openwrt-combined-${{ env.REPO_BRANCH }}-${{ hashFiles('config/*.config') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-combined-${{ env.REPO_BRANCH }}-

      - name: 🔧 设置 ccache
        run: |
          ccache --set-config=max_size=$CCACHE_MAXSIZE
          ccache --set-config=cache_dir=$CCACHE_DIR
          ccache --set-config=compression=true
          ccache -z

      - name: 🧬 更新并安装 feeds
        run: |
          cd openwrt
          [ -e $GITHUB_WORKSPACE/$FEEDS_CONF ] && mv $GITHUB_WORKSPACE/$FEEDS_CONF feeds.conf.default
          chmod +x $GITHUB_WORKSPACE/$DIY_P1_SH
          export ISTORE_ENABLE="$ISTORE_ENABLE_INPUT"
          $GITHUB_WORKSPACE/$DIY_P1_SH
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          chmod +x $GITHUB_WORKSPACE/$DIY_P2_SH
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: 🔨 构建 256M 固件
        id: compile
        run: |
          FW_NAME="${FIRMWARE_NAME_INPUT}"
          [ -z "$FW_NAME" ] && FW_NAME="ImmortalWrt"
          FW_TAG_PREFIX=$(echo "$FW_NAME" | tr '[:space:]' '-' | tr -cd '[:alnum:]._-')
          [ -z "$FW_TAG_PREFIX" ] && FW_TAG_PREFIX="ImmortalWrt"
          echo "固件名称: $FW_NAME"
          echo "固件标签前缀: $FW_TAG_PREFIX"
          echo "预设包方案: $PACKAGE_PRESET_INPUT"
          echo "启用 iStore: $ISTORE_ENABLE_INPUT"
          echo "fw_name=$FW_NAME" >> $GITHUB_OUTPUT
          echo "fw_tag_prefix=$FW_TAG_PREFIX" >> $GITHUB_OUTPUT

          normalize_packages() {
            printf '%s\n' "$1" | tr ',;' '\n\n' | tr ' ' '\n' | tr -d '\r' | sed '/^$/d'
          }

          validate_package_name() {
            if [[ ! "$1" =~ ^[A-Za-z0-9._+-]+$ ]]; then
              echo "❌ 非法包名: $1"
              exit 1
            fi
          }

          case "$PACKAGE_PRESET_INPUT" in
            "全量"|"full")
              PRESET_ADD=""
              PRESET_REMOVE=""
              ;;
            "精简"|"lite")
              PRESET_ADD=""
              PRESET_REMOVE="luci-app-openclash luci-app-package-manager luci-app-wrtbwmon luci-app-upnp luci-i18n-package-manager-zh-cn luci-i18n-wrtbwmon-zh-cn luci-i18n-upnp-zh-cn"
              ;;
            "管理"|"manage")
              PRESET_ADD="luci-app-ttyd luci-i18n-ttyd-zh-cn luci-app-upnp luci-i18n-upnp-zh-cn"
              PRESET_REMOVE="luci-app-openclash luci-app-package-manager luci-app-wrtbwmon luci-i18n-package-manager-zh-cn luci-i18n-wrtbwmon-zh-cn"
              ;;
            "代理"|"proxy")
              PRESET_ADD="luci-app-ttyd luci-i18n-ttyd-zh-cn luci-app-upnp luci-i18n-upnp-zh-cn luci-app-openclash"
              PRESET_REMOVE="luci-app-package-manager luci-app-wrtbwmon luci-i18n-package-manager-zh-cn luci-i18n-wrtbwmon-zh-cn"
              ;;
            *)
              echo "❌ 未知预设包方案: $PACKAGE_PRESET_INPUT"
              exit 1
              ;;
          esac

          if [ "$ISTORE_ENABLE_INPUT" = "true" ]; then
            FORCED_ADD="luci-app-store luci-lib-taskd luci-lib-xterm taskd"
            FORCED_REMOVE=""
          else
            FORCED_ADD=""
            FORCED_REMOVE="luci-app-store luci-lib-taskd luci-lib-xterm taskd app-store-ui"
          fi
          DEVICES="256M"
          mkdir -p $GITHUB_WORKSPACE/firmware_collection

          cd /workdir/openwrt

          for DEV in $DEVICES; do
            echo "::group::🚀 开始构建 $DEV"
            
            CONFIG="config/256m.config"
            
            echo "使用配置: $CONFIG"
            
            # 3. 加载配置
            cp -f $GITHUB_WORKSPACE/$CONFIG .config
            echo "CONFIG_VERSION_DIST=\"$FW_NAME\"" >> .config

            ENABLE_PKGS="$FORCED_ADD $PRESET_ADD $(normalize_packages "$EXTRA_PACKAGES_INPUT")"
            DISABLE_PKGS="$FORCED_REMOVE $PRESET_REMOVE $(normalize_packages "$REMOVE_PACKAGES_INPUT")"

            for PKG in $ENABLE_PKGS; do
              validate_package_name "$PKG"
              echo "CONFIG_PACKAGE_${PKG}=y" >> .config
            done

            for PKG in $DISABLE_PKGS; do
              validate_package_name "$PKG"
              echo "# CONFIG_PACKAGE_${PKG} is not set" >> .config
            done
            
            # 4. 刷新配置并下载
            make defconfig

            for PKG in $FORCED_ADD $(normalize_packages "$EXTRA_PACKAGES_INPUT"); do
              validate_package_name "$PKG"
              if ! grep -Eq "^CONFIG_PACKAGE_${PKG}=(y|m)$" .config; then
                echo "❌ 包不可用或未被启用: $PKG"
                exit 1
              fi
            done

            make download -j$(nproc)
            
            # 5. 开始编译
            # 使用 ccache 加速，并保留 Toolchain
            if ! make -j$(nproc) CC="ccache gcc" CXX="ccache g++"; then
              echo "⚠️ 多线程构建失败，回退到单线程重试..."
              make -j1 V=s || exit 1
            fi

            echo "✅ $DEV 构建完成。"
            df -hT /workdir
            echo "::endgroup::"
          done

          echo "📥 正在收集产物"
          find bin/targets/ -name "*sysupgrade.bin" -exec cp {} $GITHUB_WORKSPACE/firmware_collection/ \;

          echo "status=success" >> $GITHUB_OUTPUT

      - name: 🪄 上传二进制产物
        uses: actions/upload-artifact@v4
        if: steps.compile.outputs.status == 'success'
        with:
          name: ${{ steps.compile.outputs.fw_tag_prefix }}_Combined_${{ env.DEVICE_INPUT }}_${{ env.REPO_BRANCH }}
          path: ${{ github.workspace }}/firmware_collection/*

      - name: 📌 生成发布标签
        id: tag
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
        env:
          FW_NAME: ${{ steps.compile.outputs.fw_name }}
          FW_TAG_PREFIX: ${{ steps.compile.outputs.fw_tag_prefix }}
        run: |
          BUILD_TIME=$(date +"%Y%m%d-%H%M")
          RELEASE_TAG="${FW_TAG_PREFIX}-${BUILD_TIME}"
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

          cat > release.txt << EOF
          ## 📦 ${FW_NAME} 固件发布

          **🏷️ 版本标签:** $RELEASE_TAG
          **🌿 分支:** $REPO_BRANCH
          **📱 设备:** ${DEVICE_INPUT}
          **📅 构建时间:** $(date +"%Y-%m-%d %H:%M:%S")
          **🔨 编译器:** GCC + ccache

          ## 📥 下载

          请从下方附件下载固件文件。

          ---

          基于 [GitHub Actions](https://github.com/features/actions) 构建
          EOF

          echo "status=success" >> $GITHUB_OUTPUT

      - name: 📤 上传到发行版
        uses: softprops/action-gh-release@v2
        if: steps.tag.outputs.status == 'success'
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          prerelease: ${{ env.PRERELEASE == 'true' }}
          files: ${{ github.workspace }}/firmware_collection/*

      - name: 🚧 删除旧工作流运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 9
