name: ImmortalWrt 编译

permissions:
  contents: write

on:
  repository_dispatch:
    types: [ "Source Code Update" ]
  workflow_dispatch:
    inputs:
      device:
        description: '编译设备型号'
        required: true
        type: choice
        default: '256M'
        options:
          - '256M'
      repo:
        description: '指定源码仓库地址'
        required: true
        type: string
        default: 'https://github.com/padavanonly/immortalwrt-mt798x-6.6'
      commit:
        description: '指定源码commit进行编译，留空拉取最新源码'
        required: false
        type: string
        default: ''
      ssh:
        description: '是否执行菜单配置 (make menuconfig)'
        required: false
        type: boolean
        default: false
      release:
        description: '是否发布编译产物到发行版'
        required: false
        type: boolean
        default: true
      prerelease:
        description: '是否发布为预发布版本'
        required: false
        type: boolean
        default: false

env:
  DEVICE_INPUT: ${{ github.event.inputs.device || github.event.client_payload.device }}
  CCACHE_DIR: /workdir/.ccache
  CCACHE_MAXSIZE: 2G
  REPO_URL: ${{ github.event.inputs.repo }}
  REPO_BRANCH: openwrt-24.10-6.6
  REPO_COMMIT: ${{ github.event.inputs.commit }}
  FEEDS_CONF: feeds.conf.default
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_RELEASE: ${{ github.event.inputs.release }}
  PRERELEASE: ${{ github.event.inputs.prerelease }}
  TZ: Asia/Shanghai

jobs:
  menuconfig:
    name: ⚙️ 菜单配置并推送
    if: github.event.inputs.ssh == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: 🙌 检出代码
        uses: actions/checkout@v4

      - name: 🛠️ 初始化环境
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libncurses-dev build-essential git wget python3 bzip2
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: 🪜 克隆源码
        working-directory: /workdir
        run: |
          git clone $REPO_URL -b $REPO_BRANCH --single-branch --filter=blob:none openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: 🔧 设置设备变量
        run: |
          echo "CONFIG_FILE=config/256m.config" >> $GITHUB_ENV

      - name: 👩‍💻 复制已有配置（若存在）
        run: |
          if [ -f "$GITHUB_WORKSPACE/${CONFIG_FILE}" ]; then
            cp -f "$GITHUB_WORKSPACE/${CONFIG_FILE}" /workdir/openwrt/.config
          fi

      - name: ⚙️ 加载自定义 feeds
        run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: 🧬 更新并安装 feeds
        run: cd openwrt && ./scripts/feeds update -a && ./scripts/feeds install -a

      - name: 🧩 加载自定义配置
        run: |
          [ -e $CONFIG_FILE ] && cp -f $CONFIG_FILE openwrt/.config
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: ⌨️ SSH 连接进行菜单配置
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 15
          
      - name: 📤 推送配置到主分支
        run: |
          SRC="/workdir/openwrt/.config"
          DST="$GITHUB_WORKSPACE/${CONFIG_FILE}"
          mkdir -p "$(dirname "$DST")"
          cp -f "$SRC" "$DST"
          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$CONFIG_FILE"
          git diff --cached --quiet || (git commit -m "更新配置: ${CONFIG_FILE}" && git push origin HEAD:main)

  build:
    name: 🔨 构建固件
    needs: menuconfig
    if: always() && (needs.menuconfig.result == 'success' || needs.menuconfig.result == 'skipped')
    runs-on: ubuntu-22.04
    
    steps:
      - name: 🙌 检出代码
        uses: actions/checkout@v4

      - name: 🪠 释放磁盘空间
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: 🛠️ 初始化环境
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: 🪜 克隆源码
        working-directory: /workdir
        run: |
          git clone $REPO_URL -b $REPO_BRANCH --single-branch --filter=blob:none openwrt
          if [ -n "${REPO_COMMIT}" ]; then
            cd openwrt && git checkout ${REPO_COMMIT}
          fi
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: ⚙️ 配置 ccache 与下载缓存
        uses: actions/cache@v4
        with:
          path: |
            /workdir/.ccache
            /workdir/openwrt/dl
          key: ${{ runner.os }}-openwrt-combined-${{ env.REPO_BRANCH }}-${{ hashFiles('config/*.config') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-combined-${{ env.REPO_BRANCH }}-

      - name: 🔧 设置 ccache
        run: |
          ccache --set-config=max_size=$CCACHE_MAXSIZE
          ccache --set-config=cache_dir=$CCACHE_DIR
          ccache --set-config=compression=true
          ccache -z

      - name: 🧬 更新并安装 feeds
        run: |
          cd openwrt
          [ -e $GITHUB_WORKSPACE/$FEEDS_CONF ] && mv $GITHUB_WORKSPACE/$FEEDS_CONF feeds.conf.default
          chmod +x $GITHUB_WORKSPACE/$DIY_P1_SH
          $GITHUB_WORKSPACE/$DIY_P1_SH
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          chmod +x $GITHUB_WORKSPACE/$DIY_P2_SH
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: 🔨 构建 256M 固件
        id: compile
        run: |
          DEVICES="256M"
          mkdir -p $GITHUB_WORKSPACE/firmware_collection

          cd /workdir/openwrt

          for DEV in $DEVICES; do
            echo "::group::🚀 开始构建 $DEV"
            
            CONFIG="config/256m.config"
            
            echo "使用配置: $CONFIG"
            
            # 3. 加载配置
            cp -f $GITHUB_WORKSPACE/$CONFIG .config
            
            # 4. 刷新配置并下载
            make defconfig
            make download -j$(nproc)
            
            # 5. 开始编译
            # 使用 ccache 加速，并保留 Toolchain
            if ! make -j$(nproc) CC="ccache gcc" CXX="ccache g++"; then
              echo "⚠️ 多线程构建失败，回退到单线程重试..."
              make -j1 V=s || exit 1
            fi

            echo "✅ $DEV 构建完成。"
            df -hT /workdir
            echo "::endgroup::"
          done

          echo "📥 正在收集产物"
          find bin/targets/ -name "*sysupgrade.bin" -exec cp {} $GITHUB_WORKSPACE/firmware_collection/ \;

          echo "status=success" >> $GITHUB_OUTPUT

      - name: 🪄 上传二进制产物
        uses: actions/upload-artifact@v4
        if: steps.compile.outputs.status == 'success'
        with:
          name: ImmortalWrt_Combined_${{ env.DEVICE_INPUT }}_${{ env.REPO_BRANCH }}
          path: ${{ github.workspace }}/firmware_collection/*

      - name: 📌 生成发布标签
        id: tag
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
        run: |
          BUILD_TIME=$(date +"%Y%m%d-%H%M")
          RELEASE_TAG="ImmortalWrt-${BUILD_TIME}"
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

          cat > release.txt << EOF
          ## 📦 ImmortalWrt 固件发布

          **🏷️ 版本标签:** $RELEASE_TAG
          **🌿 分支:** $REPO_BRANCH
          **📱 设备:** ${DEVICE_INPUT}
          **📅 构建时间:** $(date +"%Y-%m-%d %H:%M:%S")
          **🔨 编译器:** GCC + ccache

          ## 📥 下载

          请从下方附件下载固件文件。

          ---

          基于 [GitHub Actions](https://github.com/features/actions) 构建
          EOF

          echo "status=success" >> $GITHUB_OUTPUT

      - name: 📤 上传到发行版
        uses: softprops/action-gh-release@v2
        if: steps.tag.outputs.status == 'success'
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          prerelease: ${{ env.PRERELEASE == 'true' }}
          files: ${{ github.workspace }}/firmware_collection/*

      - name: 🚧 删除旧工作流运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 9
