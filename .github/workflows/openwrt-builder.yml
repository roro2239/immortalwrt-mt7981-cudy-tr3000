name: ImmortalWrt 编译

permissions:
  contents: write

on:
  repository_dispatch:
    types: [ "Source Code Update" ]
  workflow_dispatch:
    inputs:
      device:
        description: '编译设备型号'
        required: true
        type: choice
        default: '256M'
        options:
          - '256M'
      repo:
        description: '指定源码仓库地址'
        required: true
        type: string
        default: 'https://github.com/padavanonly/immortalwrt-mt798x-6.6'
      commit:
        description: '指定源码commit进行编译，留空拉取最新源码'
        required: false
        type: string
        default: ''
      firmware_name:
        description: '固件名称（为空默认 CeliaWRT）'
        required: false
        type: string
        default: 'CeliaWRT'
      lan_ip:
        description: '后台地址（默认 22.2.2.2）'
        required: false
        type: string
        default: '22.2.2.2'
      disable_system_update:
        description: '是否禁用系统在线更新'
        required: false
        type: boolean
        default: true
      enable_proxy:
        description: '是否启用代理（OpenClash）'
        required: false
        type: boolean
        default: true
      enable_ttyd:
        description: '是否启用终端（ttyd）'
        required: false
        type: boolean
        default: true
      enable_upnp:
        description: '是否启用 UPnP'
        required: false
        type: boolean
        default: true
      enable_package_manager:
        description: '是否启用软件包管理'
        required: false
        type: boolean
        default: false
      enable_wrtbwmon:
        description: '是否启用流量监控（wrtbwmon）'
        required: false
        type: boolean
        default: false
      enable_istore:
        description: '是否启用 iStore'
        required: false
        type: boolean
        default: true
      extra_packages:
        description: '额外安装包（空格/逗号/换行分隔）'
        required: false
        type: string
        default: ''
      remove_packages:
        description: '移除包（空格/逗号/换行分隔）'
        required: false
        type: string
        default: ''
      release:
        description: '是否发布编译产物到发行版'
        required: false
        type: boolean
        default: true
      prerelease:
        description: '是否发布为预发布版本'
        required: false
        type: boolean
        default: false

env:
  DEVICE_INPUT: ${{ github.event.inputs.device || github.event.client_payload.device }}
  FIRMWARE_NAME_INPUT: ${{ github.event.inputs.firmware_name || github.event.client_payload.firmware_name || 'CeliaWRT' }}
  LAN_IP_INPUT: ${{ github.event.inputs.lan_ip || github.event.client_payload.lan_ip || '22.2.2.2' }}
  DISABLE_SYSTEM_UPDATE_INPUT: ${{ github.event.inputs.disable_system_update || 'true' }}
  ENABLE_PROXY_INPUT: ${{ github.event.inputs.enable_proxy || 'true' }}
  ENABLE_TTYD_INPUT: ${{ github.event.inputs.enable_ttyd || 'true' }}
  ENABLE_UPNP_INPUT: ${{ github.event.inputs.enable_upnp || 'true' }}
  ENABLE_PACKAGE_MANAGER_INPUT: ${{ github.event.inputs.enable_package_manager || 'false' }}
  ENABLE_WRTBWMON_INPUT: ${{ github.event.inputs.enable_wrtbwmon || 'false' }}
  ISTORE_ENABLE_INPUT: ${{ github.event.inputs.enable_istore || 'true' }}
  EXTRA_PACKAGES_INPUT: ${{ github.event.inputs.extra_packages || '' }}
  REMOVE_PACKAGES_INPUT: ${{ github.event.inputs.remove_packages || '' }}
  CCACHE_DIR: /workdir/.ccache
  CCACHE_MAXSIZE: 20G
  REPO_URL: ${{ github.event.inputs.repo || github.event.client_payload.repo }}
  REPO_BRANCH: openwrt-24.10-6.6
  REPO_COMMIT: ${{ github.event.inputs.commit || github.event.client_payload.commit }}
  FEEDS_CONF: feeds.conf.default
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_RELEASE: ${{ github.event.inputs.release }}
  PRERELEASE: ${{ github.event.inputs.prerelease }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  TZ: Asia/Shanghai

jobs:
  build:
    name: 🔨 构建固件
    runs-on: ubuntu-22.04
    
    steps:
      - name: 🙌 检出代码
        uses: actions/checkout@v4

      - name: 🪠 释放磁盘空间
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: 🛠️ 初始化环境
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: 🪜 克隆源码
        working-directory: /workdir
        run: |
          git clone $REPO_URL -b $REPO_BRANCH --single-branch --filter=blob:none openwrt
          if [ -n "${REPO_COMMIT}" ]; then
            cd openwrt && git checkout ${REPO_COMMIT}
          fi
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: ⚙️ 缓存 ccache
        uses: actions/cache@v4
        with:
          path: /workdir/.ccache
          key: ${{ runner.os }}-openwrt-ccache-${{ env.REPO_BRANCH }}-${{ hashFiles('config/*.config') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-ccache-${{ env.REPO_BRANCH }}-

      - name: ⚙️ 缓存 dl 下载目录
        uses: actions/cache@v4
        with:
          path: /workdir/openwrt/dl
          key: ${{ runner.os }}-openwrt-dl-${{ env.REPO_BRANCH }}
          restore-keys: |
            ${{ runner.os }}-openwrt-dl-

      - name: ⚙️ 缓存 toolchain 与 host 构建产物
        uses: actions/cache@v4
        with:
          path: |
            /workdir/openwrt/staging_dir/host
            /workdir/openwrt/staging_dir/hostpkg
            /workdir/openwrt/staging_dir/toolchain-*
          key: ${{ runner.os }}-openwrt-toolchain-${{ env.REPO_BRANCH }}-${{ hashFiles('config/*.config') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-toolchain-${{ env.REPO_BRANCH }}-

      - name: 🔧 设置 ccache
        run: |
          ccache --set-config=max_size=$CCACHE_MAXSIZE
          ccache --set-config=cache_dir=$CCACHE_DIR
          ccache --set-config=compression=true
          ccache --set-config=compiler_check=content
          ccache --set-config=sloppiness=file_macro,time_macros
          ccache -z

      - name: 🧬 更新并安装 feeds
        run: |
          cd openwrt
          [ -e $GITHUB_WORKSPACE/$FEEDS_CONF ] && mv $GITHUB_WORKSPACE/$FEEDS_CONF feeds.conf.default
          chmod +x $GITHUB_WORKSPACE/$DIY_P1_SH
          export ISTORE_ENABLE="$ISTORE_ENABLE_INPUT"
          $GITHUB_WORKSPACE/$DIY_P1_SH
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          chmod +x $GITHUB_WORKSPACE/$DIY_P2_SH
          export DISABLE_SYSTEM_UPDATE="$DISABLE_SYSTEM_UPDATE_INPUT"
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: 🔨 构建 256M 固件
        id: compile
        run: |
          FW_NAME="${FIRMWARE_NAME_INPUT}"
          [ -z "$FW_NAME" ] && FW_NAME="CeliaWRT"
          FW_TAG_PREFIX=$(echo "$FW_NAME" | tr '[:space:]' '-' | tr -cd '[:alnum:]._-')
          [ -z "$FW_TAG_PREFIX" ] && FW_TAG_PREFIX="CeliaWRT"
          LAN_IP="$LAN_IP_INPUT"

          validate_ipv4() {
            local ip="$1"
            local IFS='.'
            local -a octets=()

            read -r -a octets <<< "$ip"
            [ "${#octets[@]}" -eq 4 ] || return 1

            for octet in "${octets[@]}"; do
              [[ "$octet" =~ ^[0-9]+$ ]] || return 1
              [ "$octet" -ge 0 ] && [ "$octet" -le 255 ] || return 1
            done
          }

          if ! validate_ipv4 "$LAN_IP"; then
            echo "❌ 非法后台地址: $LAN_IP"
            exit 1
          fi

          echo "固件名称: $FW_NAME"
          echo "固件标签前缀: $FW_TAG_PREFIX"
          echo "后台地址: $LAN_IP"
          echo "禁用系统在线更新: $DISABLE_SYSTEM_UPDATE_INPUT"
          echo "启用代理(OpenClash): $ENABLE_PROXY_INPUT"
          echo "启用终端(ttyd): $ENABLE_TTYD_INPUT"
          echo "启用UPnP: $ENABLE_UPNP_INPUT"
          echo "启用软件包管理: $ENABLE_PACKAGE_MANAGER_INPUT"
          echo "启用流量监控(wrtbwmon): $ENABLE_WRTBWMON_INPUT"
          echo "启用 iStore: $ISTORE_ENABLE_INPUT"
          echo "fw_name=$FW_NAME" >> $GITHUB_OUTPUT
          echo "fw_tag_prefix=$FW_TAG_PREFIX" >> $GITHUB_OUTPUT

          normalize_packages() {
            printf '%s\n' "$1" | tr ',;' '\n\n' | tr ' ' '\n' | tr -d '\r' | sed '/^$/d'
          }

          validate_package_name() {
            if [[ ! "$1" =~ ^[A-Za-z0-9._+-]+$ ]]; then
              echo "❌ 非法包名: $1"
              exit 1
            fi
          }

          TOGGLE_ADD=""
          TOGGLE_REMOVE=""
          toggle_packages() {
            local enabled="$1"
            shift
            if [ "$enabled" = "true" ]; then
              TOGGLE_ADD="$TOGGLE_ADD $*"
            else
              TOGGLE_REMOVE="$TOGGLE_REMOVE $*"
            fi
          }

          toggle_packages "$ENABLE_PROXY_INPUT" "luci-app-openclash"
          toggle_packages "$ENABLE_TTYD_INPUT" "luci-app-ttyd luci-i18n-ttyd-zh-cn"
          toggle_packages "$ENABLE_UPNP_INPUT" "luci-app-upnp luci-i18n-upnp-zh-cn"
          toggle_packages "$ENABLE_PACKAGE_MANAGER_INPUT" "luci-app-package-manager luci-i18n-package-manager-zh-cn"
          toggle_packages "$ENABLE_WRTBWMON_INPUT" "luci-app-wrtbwmon luci-i18n-wrtbwmon-zh-cn"
          toggle_packages "$ISTORE_ENABLE_INPUT" "luci-app-store luci-lib-taskd luci-lib-xterm taskd"
          if [ "$ISTORE_ENABLE_INPUT" != "true" ]; then
            TOGGLE_REMOVE="$TOGGLE_REMOVE app-store-ui"
          fi

          DEVICES="256M"
          mkdir -p $GITHUB_WORKSPACE/firmware_collection

          cd /workdir/openwrt

          for DEV in $DEVICES; do
            echo "::group::🚀 开始构建 $DEV"
            
            CONFIG="config/256m.config"
            
            echo "使用配置: $CONFIG"
            
            # 3. 加载配置
            cp -f $GITHUB_WORKSPACE/$CONFIG .config
            echo "CONFIG_VERSION_DIST=\"$FW_NAME\"" >> .config
            if grep -q '^CONFIG_TARGET_PREINIT_IP=' .config; then
              sed -i -E "s@^CONFIG_TARGET_PREINIT_IP=.*@CONFIG_TARGET_PREINIT_IP=\"${LAN_IP}\"@" .config
            else
              echo "CONFIG_TARGET_PREINIT_IP=\"${LAN_IP}\"" >> .config
            fi

            mkdir -p files/etc/uci-defaults
            printf '%s\n' \
              '#!/bin/sh' \
              '# 首次启动时应用自定义 LAN 地址，避免依赖上游 config_generate 细节。' \
              "uci -q set network.lan.ipaddr='${LAN_IP}'" \
              'uci -q commit network' \
              'rm -f /etc/uci-defaults/99-custom-lan-ip' \
              > files/etc/uci-defaults/99-custom-lan-ip
            chmod +x files/etc/uci-defaults/99-custom-lan-ip

            ENABLE_PKGS="$TOGGLE_ADD $(normalize_packages "$EXTRA_PACKAGES_INPUT")"
            DISABLE_PKGS="$TOGGLE_REMOVE $(normalize_packages "$REMOVE_PACKAGES_INPUT")"

            for PKG in $ENABLE_PKGS; do
              validate_package_name "$PKG"
              echo "CONFIG_PACKAGE_${PKG}=y" >> .config
            done

            for PKG in $DISABLE_PKGS; do
              validate_package_name "$PKG"
              echo "# CONFIG_PACKAGE_${PKG} is not set" >> .config
            done
            
            # 4. 刷新配置并下载
            make defconfig

            for PKG in $TOGGLE_ADD $(normalize_packages "$EXTRA_PACKAGES_INPUT"); do
              validate_package_name "$PKG"
              if ! grep -Eq "^CONFIG_PACKAGE_${PKG}=(y|m)$" .config; then
                echo "❌ 包不可用或未被启用: $PKG"
                exit 1
              fi
            done

            CPU_THREADS="$(nproc)"
            BUILD_JOBS="$((CPU_THREADS + 1))"
            BUILD_LOAD="$CPU_THREADS"

            echo "CPU 线程数: ${CPU_THREADS}"
            echo "并发任务数: ${BUILD_JOBS}"
            echo "负载上限: ${BUILD_LOAD}"

            make download -j"${BUILD_JOBS}"
            
            # 5. 开始编译
            # 使用 ccache 加速，并保留 Toolchain；心跳日志避免长时间无输出。
            start_heartbeat() {
              (
                while true; do
                  echo "⏳ 编译进行中: $(date '+%F %T')"
                  sleep 60
                done
              ) &
              HEARTBEAT_PID=$!
            }

            stop_heartbeat() {
              if [ -n "${HEARTBEAT_PID:-}" ]; then
                kill "$HEARTBEAT_PID" 2>/dev/null || true
                wait "$HEARTBEAT_PID" 2>/dev/null || true
                unset HEARTBEAT_PID
              fi
            }

            start_heartbeat
            if ! make -j"${BUILD_JOBS}" -l"${BUILD_LOAD}" CC="ccache gcc" CXX="ccache g++"; then
              stop_heartbeat
              echo "⚠️ 多线程构建失败，回退到单线程重试..."
              start_heartbeat
              if ! make -j1 V=s; then
                stop_heartbeat
                exit 1
              fi
            fi
            stop_heartbeat

            echo "✅ $DEV 构建完成。"
            df -hT /workdir
            echo "::endgroup::"
          done

          echo "📥 正在收集产物"
          find bin/targets/ -name "*sysupgrade.bin" -exec cp {} $GITHUB_WORKSPACE/firmware_collection/ \;

          echo "status=success" >> $GITHUB_OUTPUT

      - name: 🪄 上传二进制产物
        uses: actions/upload-artifact@v4
        if: steps.compile.outputs.status == 'success'
        with:
          name: ${{ steps.compile.outputs.fw_tag_prefix }}_Combined_${{ env.DEVICE_INPUT }}_${{ env.REPO_BRANCH }}
          path: ${{ github.workspace }}/firmware_collection/*

      - name: 📌 生成发布标签
        id: tag
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
        env:
          FW_NAME: ${{ steps.compile.outputs.fw_name }}
          FW_TAG_PREFIX: ${{ steps.compile.outputs.fw_tag_prefix }}
        run: |
          BUILD_TIME=$(date +"%Y%m%d-%H%M")
          RELEASE_TAG="${FW_TAG_PREFIX}-${BUILD_TIME}"
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

          cat > release.txt << EOF
          ## 📦 ${FW_NAME} 固件发布

          **🏷️ 版本标签:** $RELEASE_TAG
          **🌿 分支:** $REPO_BRANCH
          **📱 设备:** ${DEVICE_INPUT}
          **📅 构建时间:** $(date +"%Y-%m-%d %H:%M:%S")
          **🔨 编译器:** GCC + ccache

          ## 📥 下载

          请从下方附件下载固件文件。

          ---

          基于 [GitHub Actions](https://github.com/features/actions) 构建
          EOF

          echo "status=success" >> $GITHUB_OUTPUT

      - name: 📤 上传到发行版
        uses: softprops/action-gh-release@v2
        if: steps.tag.outputs.status == 'success'
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          prerelease: ${{ env.PRERELEASE == 'true' }}
          files: ${{ github.workspace }}/firmware_collection/*

      - name: 🚧 删除旧工作流运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 9
